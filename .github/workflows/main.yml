name: Daily AI News Update

on:
  schedule:
    - cron: '30 22 * * *' 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3
      
      - name: 安装 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装依赖包
        run: pip install requests google-genai

      - name: 运行爬虫脚本
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_news.py

      - name: 把更新后的数据推送到网页
        run: |
          git config --global user.name 'Robot'
          git config --global user.email 'robot@github.com'
          git add data.json
          git commit -m "自动更新每日AI情报" || exit 0
          git push
